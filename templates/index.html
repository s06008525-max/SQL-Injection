<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Laboratorio SQL Injection</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e2f; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { display: flex; gap: 30px; margin-top: 40px; }
        .card { padding: 40px; border-radius: 12px; text-decoration: none; color: white; text-align: center; width: 300px; transition: transform 0.2s; }
        .card:hover { transform: translateY(-10px); }
        .vulnerable { background: linear-gradient(135deg, #ff416c, #ff4b2b); box-shadow: 0 10px 20px rgba(255, 75, 43, 0.4); }
        .secure { background: linear-gradient(135deg, #11998e, #38ef7d); box-shadow: 0 10px 20px rgba(56, 239, 125, 0.4); }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Laboratorio de Seguridad</h1>
    <p>Comparativa de Arquitecturas de Bases de Datos</p>
    <div class="container">
        <a href="/vulnerable" class="card vulnerable">
            <h2>🔴 Entorno Vulnerable</h2>
            <p>Malas Prácticas y Destrucción</p>
        </a>
        <a href="/seguro" class="card secure">
            <h2>🟢 Entorno Seguro</h2>
            <p>.env, Hashing y Parametrización</p>
        </a>
    </div>
</body>
</html>
